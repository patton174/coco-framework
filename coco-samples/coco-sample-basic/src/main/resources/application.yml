coco:
  features:
    disabled:
      - mybatis-plus
      - tenant
      - data-permission
  common:
    i18n:
      basename:
        - messages
        - coco-messages
      default-locale: zh-CN
      fallback-to-system-locale: false
      use-code-as-default-message: true
  web:
    signature:
      secrets:
        sample-app: ${SAMPLE_SIGNING_KEY:}
      matcher:
        required:
          - methods:
              - POST
            path-patterns:
              - /sample/secure/signature/orders
    replay:
      protect-signed-requests: false
      protect-encrypted-requests: false
      matcher:
        required:
          - methods:
              - POST
            path-patterns:
              - /sample/secure/replay/orders
    encryption:
      keys:
        sample-app: ${SAMPLE_ENCRYPTION_KEY:}
      matcher:
        required:
          - methods:
              - POST
            path-patterns:
              - /sample/secure/encryption/orders
  logging:
    node-renderer:
      enabled: true
      jar-only: false
      command: "D:\\Program Files\\nodejs\\node.exe"
      color: always
