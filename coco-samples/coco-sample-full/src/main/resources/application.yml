spring:
  application:
    name: coco-sample-full
  datasource:
    url: jdbc:h2:mem:coco-full;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always

coco:
  common:
    i18n:
      basename:
        - coco-messages
      default-locale: en-US
      fallback-to-system-locale: false
      use-code-as-default-message: true
  security:
    web:
      header:
        enabled: true
  tenant:
    sql:
      enabled: true
      tenant-id-column: tenant_id
      fail-on-missing-context: true
  data-permission:
    sql:
      enabled: true
      missing-context-policy: THROW
      missing-rule-policy: DENY
      resources:
        sample-order:
          tables:
            - sample_orders
          column: owner_id
          column-type: STRING
  audit:
    enabled: true
    access-log:
      enabled: false
  logging:
    node-renderer:
      enabled: false
