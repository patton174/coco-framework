base-package: io.github.coco.sample.generated.catalog
resources:
  - name: CatalogItem
    table: catalog_item
    api-path: /generated/catalog-items
    id:
      name: id
      column: id
      type: Long
      strategy: AUTO
    fields:
      - name: sku
        column: sku
        type: String
        required: true
      - name: displayName
        column: display_name
        type: String
        required: true
      - name: unitPrice
        column: unit_price
        type: BigDecimal
        required: true
