name: Reusable / Static Analysis

# Reusable deterministic review pipeline: workflow lint, jury protocol tests,
# SpotBugs, and Checkstyle. SpotBugs remains report-only until its legacy
# baseline is cleared; all other step failures block the CI gate.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  analyze:
    name: SpotBugs + Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21 toolchain
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Go for actionlint
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: false

      - name: Set up Python for jury protocol tests
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Python governance tooling
        run: python -m pip install --disable-pip-version-check -r .github/requirements/static-analysis.txt

      - name: Set up Node.js for README protocol tests
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Validate workflows and embedded shell
        shell: bash
        run: |
          set -euo pipefail
          shellcheck --version
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -shellcheck=shellcheck

      - name: Test repository governance protocols
        run: |
          python -m py_compile \
            .github/scripts/agent_review.py \
            .github/scripts/agent_issue_gate.py \
            .github/scripts/auto_merge.py \
            .github/scripts/test_agent_review.py \
            .github/scripts/test_auto_merge.py \
            .github/scripts/release_file_count_preflight.py \
            .github/scripts/test_release_file_count_preflight.py \
            .github/scripts/verify_sample_feature_coordinates.py \
            .github/scripts/test_verify_sample_feature_coordinates.py
          python .github/scripts/test_agent_review.py
          python .github/scripts/test_auto_merge.py
          python .github/scripts/test_release_file_count_preflight.py
          python .github/scripts/test_verify_sample_feature_coordinates.py
          python -m ruff check .github/scripts
          python -m ruff format --check .github/scripts
          node --test .github/readme/tests/readme.test.mjs
          node .github/readme/scripts/render.mjs --check

      # SpotBugs analyzes compiled bytecode, so classes must exist first.
      # A single reactor invocation resolves inter-module dependencies.
      - name: Compile classes
        run: mvn -B -ntp -DskipTests test-compile

      - name: SpotBugs
        # Existing EI_EXPOSE_REP findings predate this governance change. Keep
        # publishing reports without claiming the baseline is clean.
        continue-on-error: true
        run: mvn -B -ntp spotbugs:check

      - name: Checkstyle
        run: mvn -B -ntp checkstyle:check

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-analysis-reports
          path: |
            **/target/spotbugsXml.xml
            **/target/checkstyle-result.xml
          if-no-files-found: ignore
