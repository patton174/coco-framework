name: Agent Review Jury
run-name: "Agent Review Jury / PR #${{ github.event.pull_request.number }} / ${{ github.event.pull_request.head.sha }}"

# This entrypoint performs only protected-base routing. Secret-backed jobs are
# called only for same-repository humans or the exact pinned Coco App identity.

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions: {}

concurrency:
  group: >-
    agent-review-router-${{ github.repository_id }}-${{ github.event.pull_request.number }}-${{
      github.event_name == 'pull_request_review' && 'approval' || 'head'
    }}
  cancel-in-progress: true

jobs:
  route:
    name: Route bound pull request
    if: github.event_name != 'pull_request_review' || github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      review-route: ${{ steps.route.outputs.review-route }}
    steps:
      - name: Checkout protected review router
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .agent-review-base
          persist-credentials: false
          sparse-checkout: |
            .github/agent-review
            .github/scripts

      - name: Classify bound pull request
        id: route
        shell: bash
        env:
          COCO_AGENT_APP_BOT_ID: ${{ vars.COCO_AGENT_APP_BOT_ID }}
          COCO_AGENT_APP_LOGIN: ${{ vars.COCO_AGENT_APP_LOGIN }}
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          review_script='.agent-review-base/.github/scripts/agent_review.py'
          output="${RUNNER_TEMP}/agent-review-route.json"
          if python3 "${review_script}" route --help >/dev/null 2>&1; then
            route_mode='route'
            python3 "${review_script}" route \
              --repository "${REPOSITORY}" \
              --repository-id "${REPOSITORY_ID}" \
              --pr-number "${PR_NUMBER}" \
              --event-name "${EVENT_NAME}" \
              --expected-head-sha "${EXPECTED_HEAD_SHA}" \
              --config .agent-review-base/.github/agent-review/config.json \
              --output "${output}"
          else
            route_mode='legacy-prepare'
            python3 "${review_script}" prepare \
              --repository "${REPOSITORY}" \
              --pr-number "${PR_NUMBER}" \
              --event-name "${EVENT_NAME}" \
              --expected-head-sha "${EXPECTED_HEAD_SHA}" \
              --base-root .agent-review-base \
              --config .agent-review-base/.github/agent-review/config.json \
              --context-output "${RUNNER_TEMP}/agent-review-route-context.json" \
              --metadata-output "${output}"
          fi
          python3 - "${output}" "${GITHUB_OUTPUT}" "${route_mode}" "${EVENT_NAME}" \
            "${REPOSITORY}" "${PR_NUMBER}" "${EXPECTED_HEAD_SHA}" "${EXPECTED_BASE_SHA}" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          route_mode = sys.argv[3]
          event_name = sys.argv[4]
          repository = sys.argv[5]
          pr_number_text = sys.argv[6]
          expected_head_sha = sys.argv[7]
          expected_base_sha = sys.argv[8]
          if route_mode == "route":
              review_route = payload.get("review_route")
              if review_route not in {
                  "deferred-pinned-bot",
                  "direct-secret",
                  "no-secret",
              }:
                  raise SystemExit("Protected-base router returned an invalid review route.")
          elif route_mode == "legacy-prepare":
              if not pr_number_text.isdecimal():
                  raise SystemExit(
                      "Legacy protected-base metadata is not an exact trusted approval skip."
                  )
              expected_pr_number = int(pr_number_text)
              exact_compat_skip = (
                  event_name == "pull_request_review"
                  and payload.get("trusted") is True
                  and payload.get("ignored") is True
                  and payload.get("repository") == repository
                  and type(payload.get("pr_number")) is int
                  and payload.get("pr_number") == expected_pr_number
                  and expected_pr_number > 0
                  and payload.get("head_sha") == expected_head_sha
                  and payload.get("base_sha") == expected_base_sha
              )
              if not exact_compat_skip:
                  raise SystemExit(
                      "Legacy protected-base metadata is not an exact trusted approval skip."
                  )
              review_route = "compat-skip"
          else:
              raise SystemExit("Protected-base router mode is invalid.")
          default_reason = (
              "legacy-exact-approval-skip"
              if route_mode == "legacy-prepare"
              else "route-reason-unavailable"
          )
          route_log = {
              "event": "agent-review-route",
              "route_mode": route_mode,
              "event_name": event_name,
              "repository": repository,
              "pr_number": (
                  int(pr_number_text) if pr_number_text.isdecimal() else pr_number_text
              ),
              "head_sha": expected_head_sha,
              "base_sha": expected_base_sha,
              "review_route": review_route,
              "route_reason": payload.get("route_reason", default_reason),
              "author_login": payload.get("author_login", ""),
              "author_type": payload.get("author_type", ""),
              "author_id": payload.get("author_id"),
              "head_repository": payload.get("head_repository", ""),
          }
          print(
              "agent-review-route "
              + json.dumps(route_log, sort_keys=True, separators=(",", ":"))
          )
          with pathlib.Path(sys.argv[2]).open("a", encoding="utf-8") as target:
              target.write(f"review-route={review_route}\n")
          PY

  direct-secret-review:
    name: Run direct secret-backed jury
    needs: route
    if: needs.route.outputs.review-route == 'direct-secret'
    permissions:
      actions: read
      contents: read
      pull-requests: read
      statuses: write
    uses: ./.github/workflows/reusable-agent-review-jury.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      expected_base_sha: ${{ github.event.pull_request.base.sha }}
      expected_head_sha: ${{ github.event.pull_request.head.sha }}
      event_name: ${{ github.event_name }}
      repository_id: ${{ fromJSON(github.repository_id) }}
    secrets: inherit

  no-secret-review:
    name: Run no-secret or deferred marker path
    needs: route
    if: needs.route.outputs.review-route == 'no-secret' || needs.route.outputs.review-route == 'deferred-pinned-bot'
    permissions:
      actions: read
      contents: read
      pull-requests: read
      statuses: write
    uses: ./.github/workflows/reusable-agent-review-jury.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      expected_base_sha: ${{ github.event.pull_request.base.sha }}
      expected_head_sha: ${{ github.event.pull_request.head.sha }}
      event_name: ${{ github.event_name }}
      repository_id: ${{ fromJSON(github.repository_id) }}
