name: Claude Review

# AI review agent. Runs Claude automatically on every pull request to review the
# diff and leave inline comments, and on demand when someone writes "@claude" in
# a PR/issue comment. Requires the ANTHROPIC_API_KEY repository secret (or swap
# to claude_code_oauth_token). The deterministic review half lives in
# _static-analysis.yml and codeql.yml.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    # Skip bots; on comment events only run when "@claude" is mentioned.
    if: >
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          # 中转站(relay)配置:指向兼容 Anthropic /v1/messages 协议的端点。
          # 在仓库 Secrets 里配 ANTHROPIC_BASE_URL(如 https://your-relay.example/v1)。
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          # 若中转站用 x-api-key(默认),下面 anthropic_api_key 输入即可;
          # 若用 Authorization: Bearer,改为在此设 ANTHROPIC_AUTH_TOKEN,并删掉 anthropic_api_key 输入。
          # ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # For automatic PR runs, review the diff; for @claude comments, the
          # action uses the comment as the prompt automatically.
          prompt: |
            Review this pull request for the Coco Framework (a convention-driven
            Spring Boot server framework published to Maven Central). Focus on:
            - Correctness bugs, concurrency/thread-safety, and resource leaks.
            - Public API and SPI stability — flag breaking changes to
              coco-api-core contracts and starter/autoconfigure wiring.
            - Adherence to project rules in AGENTS.md (module boundaries, no
              common->feature dependencies, messages in bundles not hard-coded,
              generated source over runtime magic).
            - Security of request handling (signatures, encryption, replay,
              tenant/data-permission SQL isolation).
            - Test coverage for the change.
            Leave concise, actionable inline comments. Do not restate the diff.
          # Read-only tools: review, don't modify. Keep turns/cost bounded.
          # 模型名走仓库变量 vars.CLAUDE_MODEL(Settings → Variables 里设),
          # 未设置时回退到默认值。改成中转站实际提供的模型名即可,无需动 YAML。
          claude_args: |
            --model ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
            --max-turns 12
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
