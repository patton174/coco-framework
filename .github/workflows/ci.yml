name: CI

# Main deterministic pipeline. Tests, static analysis, and CodeQL join one
# stable gate. Secret-backed Agent review runs separately from the protected
# base branch and publishes its own stable status context.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/reusable-tests.yml

  static-analysis:
    name: Static analysis
    uses: ./.github/workflows/reusable-static-analysis.yml

  codeql:
    name: CodeQL
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/reusable-codeql.yml

  gate:
    name: CI gate
    needs: [test, static-analysis, codeql]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all pipeline jobs to succeed
        shell: bash
        run: |
          echo "test            = ${{ needs.test.result }}"
          echo "static-analysis = ${{ needs.static-analysis.result }}"
          echo "codeql          = ${{ needs.codeql.result }}"
          if [[ "${{ needs.test.result }}" != "success" \
             || "${{ needs.static-analysis.result }}" != "success" \
             || "${{ needs.codeql.result }}" != "success" ]]; then
            echo "::error::CI pipeline failed."
            exit 1
          fi
          echo "CI pipeline passed."
