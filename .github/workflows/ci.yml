name: CI

# Main pipeline. Fans out into reusable sub-workflows (test + static analysis)
# and joins them at a single `gate` job that branch protection can require.
# The AI review agent (claude-review.yml) and CodeQL (codeql.yml) run as their
# own PR-triggered workflows and appear as independent required checks.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/_test.yml

  static-analysis:
    name: Static analysis
    uses: ./.github/workflows/_static-analysis.yml
    with:
      # Phase 1: report findings without blocking. Flip to true after baseline cleanup.
      fail-on-error: false

  gate:
    name: CI gate
    needs: [test, static-analysis]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all pipeline jobs to succeed
        shell: bash
        run: |
          echo "test            = ${{ needs.test.result }}"
          echo "static-analysis = ${{ needs.static-analysis.result }}"
          if [[ "${{ needs.test.result }}" != "success" || "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo "::error::CI pipeline failed."
            exit 1
          fi
          echo "CI pipeline passed."
