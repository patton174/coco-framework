name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.0.0. Leave empty to generate the next patch version.'
        required: false
        default: ''
        type: string
      autoPublish:
        description: 'Publish automatically after Central validation; otherwise approve in Central while the run waits'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository_id }}
  cancel-in-progress: false

jobs:
  guard:
    name: Verify protected main release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require the latest protected main commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Release must be dispatched from the protected main branch."
            exit 1
          fi

          latest_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ -z "${latest_main_sha}" || "${GITHUB_SHA}" != "${latest_main_sha}" ]]; then
            echo "::error::Release commit ${GITHUB_SHA} is not the latest main commit ${latest_main_sha}."
            exit 1
          fi

  # Reuse the release-critical cross-platform build and sample verification as
  # a hard prerequisite. Static analysis and CodeQL remain merge-time CI gates.
  test:
    name: Test
    needs: guard
    uses: ./.github/workflows/reusable-tests.yml

  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    # The environment scopes Central and signing secrets and accepts only main.
    environment: coco-spring
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reconfirm the release commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "${GITHUB_REF}" != "refs/heads/main" || "${GITHUB_SHA}" != "${latest_main_sha}" ]]; then
            echo "::error::Protected main changed after release validation. Dispatch a new release run."
            exit 1
          fi

      - name: Resolve release inputs
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_AUTO_PUBLISH: ${{ inputs.autoPublish }}
        run: |
          set -euo pipefail

          normalize_version() {
            local raw_version="$1"
            local version="${raw_version#v}"
            if [[ ! "${version}" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Release version must be SemVer, for example 1.0.0 or v1.0.0."
              exit 1
            fi
            if [[ "${version}" == *SNAPSHOT* ]]; then
              echo "::error::Maven Central release version must not contain SNAPSHOT."
              exit 1
            fi
            printf '%s' "${version}"
          }

          next_patch_version() {
            local latest_tag
            latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
            if [[ -z "${latest_tag}" ]]; then
              printf '1.0.0'
              return
            fi

            local latest="${latest_tag#v}"
            local major minor patch
            IFS='.' read -r major minor patch <<< "${latest}"
            patch="${patch%%-*}"
            printf '%s.%s.%s' "${major}" "${minor}" "$((patch + 1))"
          }

          if [[ -n "${INPUT_VERSION}" ]]; then
            release_version="$(normalize_version "${INPUT_VERSION}")"
            central_auto_publish="${INPUT_AUTO_PUBLISH:-false}"
          else
            release_version="$(next_patch_version)"
            central_auto_publish="${INPUT_AUTO_PUBLISH:-false}"
          fi

          if [[ "${central_auto_publish}" != "true" ]]; then
            central_auto_publish="false"
          fi

          central_wait_until="PUBLISHED"

          {
            echo "RELEASE_TAG=v${release_version}"
            echo "RELEASE_VERSION=${release_version}"
            echo "CENTRAL_AUTO_PUBLISH=${central_auto_publish}"
            echo "CENTRAL_WAIT_UNTIL=${central_wait_until}"
          } >> "$GITHUB_ENV"
          {
            echo "version=${release_version}"
            echo "tag=v${release_version}"
            echo "central-wait-until=${central_wait_until}"
          } >> "$GITHUB_OUTPUT"

      - name: Guard duplicate release
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" > /dev/null; then
            echo "::error::Release tag ${RELEASE_TAG} already exists. Leave version empty for the next patch version, or provide a higher SemVer."
            exit 1
          fi

          central_url="https://repo1.maven.org/maven2/io/github/patton174/coco-framework/${RELEASE_VERSION}/"
          central_status="$(curl -L -s -o /dev/null -w '%{http_code}' "${central_url}")"
          if [[ "${central_status}" == "200" ]]; then
            echo "::error::Maven Central version ${RELEASE_VERSION} already exists at ${central_url}."
            exit 1
          fi

      - name: Set up JDK and Maven credentials
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      - name: Prepare GPG signing key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${GPG_PRIVATE_KEY}" ]]; then
            echo "::error::GPG_PRIVATE_KEY secret is required."
            exit 1
          fi

          if [[ "${GPG_PRIVATE_KEY}" == *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            signing_key="${GPG_PRIVATE_KEY//\\n/$'\n'}"
          else
            signing_key="$(printf '%s' "${GPG_PRIVATE_KEY}" | base64 --decode)"
          fi

          if [[ "${signing_key}" != *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            echo "::error::GPG_PRIVATE_KEY must be an ASCII-armored private key or base64-encoded ASCII-armored private key."
            exit 1
          fi

          {
            echo 'MAVEN_GPG_KEY<<COCO_GPG_KEY'
            printf '%s\n' "${signing_key}"
            echo 'COCO_GPG_KEY'
          } >> "${GITHUB_ENV}"

      - name: Publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: >
          mvn -B -ntp -Prelease
          -Drevision="${RELEASE_VERSION}"
          -Dcentral.auto-publish="${CENTRAL_AUTO_PUBLISH}"
          -Dcentral.wait-until="${CENTRAL_WAIT_UNTIL}"
          -DskipTests
          deploy

  tag:
    name: Create immutable release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - test
      - publish
    environment: coco-spring
    permissions:
      contents: read
    steps:
      - name: Revalidate release target before privileged token mint
        id: release-target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
          RELEASE_VERSION: ${{ needs.publish.outputs.version }}
          EXPECTED_APP_CLIENT_ID: ${{ vars.COCO_RELEASE_APP_CLIENT_ID }}
          EXPECTED_APP_ID: ${{ vars.COCO_RELEASE_APP_ID }}
          EXPECTED_APP_SLUG: ${{ vars.COCO_RELEASE_APP_SLUG }}
          EXPECTED_APP_LOGIN: ${{ vars.COCO_RELEASE_APP_LOGIN }}
          EXPECTED_APP_BOT_ID: ${{ vars.COCO_RELEASE_APP_BOT_ID }}
          EXPECTED_INSTALLATION_ID: ${{ vars.COCO_RELEASE_APP_INSTALLATION_ID }}
        run: |
          set -euo pipefail

          for variable in RELEASE_TAG RELEASE_VERSION EXPECTED_APP_CLIENT_ID \
            EXPECTED_APP_ID EXPECTED_APP_SLUG EXPECTED_APP_LOGIN \
            EXPECTED_APP_BOT_ID EXPECTED_INSTALLATION_ID; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::${variable} must be configured."
              exit 1
            fi
          done
          if [[ "${EXPECTED_APP_CLIENT_ID}" != "Iv23lidonlM70wdbJF3Y" \
             || "${EXPECTED_APP_ID}" != "4279686" \
             || "${EXPECTED_APP_SLUG}" != "coco-framework-release" \
             || "${EXPECTED_APP_LOGIN}" != "coco-framework-release[bot]" \
             || "${EXPECTED_APP_BOT_ID}" != "304043332" \
             || "${EXPECTED_INSTALLATION_ID}" != "146080543" ]]; then
            echo "::error::Protected Release App identity pins have drifted."
            exit 1
          fi
          if [[ "${RELEASE_TAG}" != "v${RELEASE_VERSION}" ]]; then
            echo "::error::Release tag and release version are not bound."
            exit 1
          fi

          repository_json="$(gh api "repos/${GITHUB_REPOSITORY}")"
          if [[ "$(jq -r '.id' <<< "${repository_json}")" != "${GITHUB_REPOSITORY_ID}" \
             || "$(jq -r '.full_name' <<< "${repository_json}")" != "${GITHUB_REPOSITORY}" \
             || "$(jq -r '.default_branch' <<< "${repository_json}")" != "main" ]]; then
            echo "::error::Release target repository does not match the workflow identity."
            exit 1
          fi

          latest_main_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "${GITHUB_REF}" != "refs/heads/main" \
             || "${GITHUB_SHA}" != "${latest_main_sha}" ]]; then
            echo "::error::Release tag target is not the latest protected main commit."
            exit 1
          fi

          matching_refs="$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/${RELEASE_TAG}")"
          tag_ref_count="$(jq --arg ref "refs/tags/${RELEASE_TAG}" \
            '[.[] | select(.ref == $ref)] | length' <<< "${matching_refs}")"
          if [[ ! "${tag_ref_count}" =~ ^[0-9]+$ ]]; then
            echo "::error::GitHub returned an invalid release tag lookup result."
            exit 1
          fi
          if (( tag_ref_count != 0 )); then
            echo "::error::Release tag ${RELEASE_TAG} already exists."
            exit 1
          fi
          echo "validated=true" >> "${GITHUB_OUTPUT}"

      - name: Create Release App installation token
        id: release-app-token
        if: steps.release-target.outputs.validated == 'true'
        # GitHub exposes no tag-only App permission. The dedicated App is
        # installed on this repository alone and bypasses only the v* creation
        # ruleset; branch rules and tag update/deletion rules have no App bypass.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.COCO_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.COCO_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          skip-token-revoke: false

      - name: Bind Release App identity and repository
        id: release-app-identity
        if: steps.release-target.outputs.validated == 'true'
        shell: bash
        env:
          APP_TOKEN: ${{ steps.release-app-token.outputs.token }}
          ACTUAL_APP_SLUG: ${{ steps.release-app-token.outputs.app-slug }}
          ACTUAL_INSTALLATION_ID: ${{ steps.release-app-token.outputs.installation-id }}
          EXPECTED_APP_SLUG: ${{ vars.COCO_RELEASE_APP_SLUG }}
          EXPECTED_APP_LOGIN: ${{ vars.COCO_RELEASE_APP_LOGIN }}
          EXPECTED_APP_BOT_ID: ${{ vars.COCO_RELEASE_APP_BOT_ID }}
          EXPECTED_INSTALLATION_ID: ${{ vars.COCO_RELEASE_APP_INSTALLATION_ID }}
        run: |
          set -euo pipefail

          for variable in ACTUAL_APP_SLUG ACTUAL_INSTALLATION_ID EXPECTED_APP_SLUG \
            EXPECTED_APP_LOGIN EXPECTED_APP_BOT_ID EXPECTED_INSTALLATION_ID; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::${variable} must be configured."
              exit 1
            fi
          done
          if [[ "${ACTUAL_APP_SLUG}" != "${EXPECTED_APP_SLUG}" \
             || "${ACTUAL_INSTALLATION_ID}" != "${EXPECTED_INSTALLATION_ID}" ]]; then
            echo "::error::Release App slug or installation ID does not match repository policy."
            exit 1
          fi

          derived_login="${ACTUAL_APP_SLUG}[bot]"
          user_json="$(GH_TOKEN="${APP_TOKEN}" gh api "users/${derived_login}")"
          actual_login="$(jq -r '.login' <<< "${user_json}")"
          actual_type="$(jq -r '.type' <<< "${user_json}")"
          actual_bot_id="$(jq -r '.id' <<< "${user_json}")"
          if [[ "${derived_login}" != "${EXPECTED_APP_LOGIN}" \
             || "${actual_login}" != "${EXPECTED_APP_LOGIN}" \
             || "${actual_type}" != "Bot" \
             || ! "${EXPECTED_APP_BOT_ID}" =~ ^[1-9][0-9]*$ \
             || "${actual_bot_id}" != "${EXPECTED_APP_BOT_ID}" ]]; then
            echo "::error::Release App bot identity does not match repository policy."
            exit 1
          fi

          repository_json="$(GH_TOKEN="${APP_TOKEN}" gh api \
            "repos/${GITHUB_REPOSITORY}")"
          if [[ "$(jq -r '.id' <<< "${repository_json}")" != "${GITHUB_REPOSITORY_ID}" \
             || "$(jq -r '.full_name' <<< "${repository_json}")" != "${GITHUB_REPOSITORY}" \
             || "$(jq -r '.default_branch' <<< "${repository_json}")" != "main" ]]; then
            echo "::error::Release App installation is not bound to the expected repository."
            exit 1
          fi

          echo "authorized=true" >> "${GITHUB_OUTPUT}"
          echo "::notice::Bound ${actual_login} (${actual_bot_id}), installation ${ACTUAL_INSTALLATION_ID}, to repository ${GITHUB_REPOSITORY_ID}."
          {
            echo "### Release App binding"
            echo "- App: \`${actual_login}\`"
            echo "- Bot ID: \`${actual_bot_id}\`"
            echo "- Installation ID: \`${ACTUAL_INSTALLATION_ID}\`"
            echo "- Repository ID: \`${GITHUB_REPOSITORY_ID}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Tag the successful release
        if: >-
          steps.release-target.outputs.validated == 'true' &&
          steps.release-app-identity.outputs.authorized == 'true'
        shell: bash
        env:
          APP_TOKEN: ${{ steps.release-app-token.outputs.token }}
          READ_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
          RELEASE_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail

          require_current_main() {
            local latest_main_sha
            latest_main_sha="$(GH_TOKEN="${READ_TOKEN}" gh api \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
            if [[ "${GITHUB_REF}" != "refs/heads/main" \
               || "${GITHUB_SHA}" != "${latest_main_sha}" ]]; then
              echo "::error::Release tag target is no longer the latest protected main commit."
              exit 1
            fi
          }

          require_current_main
          matching_refs="$(GH_TOKEN="${READ_TOKEN}" gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/${RELEASE_TAG}")"
          tag_ref_count="$(jq --arg ref "refs/tags/${RELEASE_TAG}" \
            '[.[] | select(.ref == $ref)] | length' <<< "${matching_refs}")"
          if [[ ! "${tag_ref_count}" =~ ^[0-9]+$ ]]; then
            echo "::error::GitHub returned an invalid release tag lookup result."
            exit 1
          fi
          if (( tag_ref_count != 0 )); then
            echo "::error::Release tag ${RELEASE_TAG} already exists."
            exit 1
          fi

          require_current_main
          tag_object_sha="$(GH_TOKEN="${APP_TOKEN}" gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/tags" \
            -f tag="${RELEASE_TAG}" \
            -f message="Release ${RELEASE_VERSION}" \
            -f object="${GITHUB_SHA}" \
            -f type='commit' \
            --jq '.sha')"

          # An annotated tag object is harmless until a ref points to it. Rebind
          # main immediately before the only operation that makes the tag visible.
          require_current_main
          GH_TOKEN="${APP_TOKEN}" gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="${tag_object_sha}" > /dev/null

          created_tag_sha="$(GH_TOKEN="${READ_TOKEN}" gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')"
          if [[ "${created_tag_sha}" != "${tag_object_sha}" ]]; then
            echo "::error::Created release tag does not reference the expected annotated tag object."
            exit 1
          fi
          echo "::notice::Created immutable ${RELEASE_TAG} for ${GITHUB_SHA} with the bound Release App."
