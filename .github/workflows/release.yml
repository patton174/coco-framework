name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.0.0'
        required: true
        type: string
      autoPublish:
        description: 'Publish automatically after Central validation'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release inputs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "CENTRAL_AUTO_PUBLISH=${{ inputs.autoPublish }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "CENTRAL_AUTO_PUBLISH=false" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK and Maven credentials
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: >
          mvn -B -ntp -Prelease
          -Drevision="${RELEASE_VERSION}"
          -Dcentral.auto-publish="${CENTRAL_AUTO_PUBLISH}"
          -DskipTests
          deploy
