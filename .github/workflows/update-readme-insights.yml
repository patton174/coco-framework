name: Update README Insights

on:
  workflow_dispatch:
  schedule:
    - cron: '24 2 * * *'

permissions:
  contents: write

concurrency:
  group: update-readme-insights
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Update README insights
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/docs/update-readme-insights.mjs

      - name: Commit README updates
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md README_CN.md; then
            echo "README insights are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README_CN.md
          git commit -m "docs: update README insights"
          git push
