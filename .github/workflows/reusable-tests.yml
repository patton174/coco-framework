name: Reusable / Tests

# Reusable test pipeline: cross-platform framework build + starter integration.
# Called by ci.yml (push/PR) and release.yml (before publishing) so the exact
# same verification runs in CI and at release time. Not triggered directly.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    env:
      JAVA_TOOLCHAIN_VERSION: '21'
      MAVEN_COMPILE_RELEASE: '17'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21 toolchain
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_TOOLCHAIN_VERSION }}
          cache: maven

      - name: Show Java toolchain and target bytecode
        shell: bash
        run: |
          java -version
          echo "Maven compiler release target: ${MAVEN_COMPILE_RELEASE}"

      - name: Verify framework and starter integration
        run: mvn -B -ntp install
