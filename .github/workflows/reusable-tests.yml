name: Reusable / Tests

# Reusable test pipeline: cross-platform framework build + sample verification.
# Called by ci.yml (push/PR) and release.yml (before publishing) so the exact
# same verification runs in CI and at release time. Not triggered directly.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    env:
      JAVA_TOOLCHAIN_VERSION: '21'
      MAVEN_COMPILE_RELEASE: '17'
      PYTHONUTF8: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21 toolchain
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_TOOLCHAIN_VERSION }}
          cache: maven

      - name: Show Java toolchain and target bytecode
        shell: bash
        run: |
          java -version
          echo "Maven compiler release target: ${MAVEN_COMPILE_RELEASE}"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/requirements/ci.txt

      - name: Install sample verification dependencies
        run: python -m pip install --disable-pip-version-check -r .github/requirements/ci.txt

      - name: Verify framework and install artifacts
        run: mvn -B -ntp install

      - name: Verify sample parent version alignment
        run: python coco-samples/coco-sample-basic/scripts/verify_parent_version.py

      - name: Verify sample business application
        run: mvn -B -ntp -f coco-samples/coco-sample-basic/pom.xml verify

      - name: Verify sample feature pruning
        run: >-
          python .github/scripts/verify_sample_feature_coordinates.py
          --archive coco-samples/coco-sample-basic/target/coco-sample-basic-0.0.1-SNAPSHOT.jar
          --required-features web audit security openapi
          --forbidden-features mybatis-plus tenant data-permission codegen
          --forbidden-library-prefixes mybatis-

      - name: Verify sample business flow with Python
        run: python coco-samples/coco-sample-basic/scripts/verify_business_flow.py

      - name: Verify full sample business application
        run: mvn -B -ntp -f coco-samples/coco-sample-full/pom.xml verify

      - name: Verify full sample feature composition
        run: >-
          python .github/scripts/verify_sample_feature_coordinates.py
          --archive coco-samples/coco-sample-full/target/coco-sample-full-0.0.1-SNAPSHOT.jar
          --required-features web mybatis-plus audit security tenant data-permission openapi
          --required-library-prefixes h2-
          --require-codegen

      - name: Verify full sample business flow with Python
        run: python coco-samples/coco-sample-full/scripts/verify_business_flow.py
