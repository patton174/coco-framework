name: CodeQL

# Reusable Java security analysis. CI calls it for pushes, PRs, and manual
# verification; the schedule keeps the default branch scanned independently.

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '37 5 * * 1'  # weekly, Monday 05:37 UTC

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # CodeQL autobuild uses the working tree, but incremental analysis
        # benefits from full git history. fetch-depth: 0 also enables the
        # GitHub UI's blame/annotation features for findings.
        with:
          fetch-depth: 0
          persist-credentials: false

      # setup-java must precede CodeQL init so autobuild uses the right JDK.
      - name: Set up JDK 21 toolchain
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: java-kotlin

      - name: Autobuild
        uses: github/codeql-action/autobuild@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:java-kotlin"
