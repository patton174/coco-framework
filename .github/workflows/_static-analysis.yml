name: Reusable / Static Analysis

# Reusable deterministic review pipeline: workflow lint, jury protocol tests,
# SpotBugs, and Checkstyle. SpotBugs remains report-only until its legacy
# baseline is cleared; all other step failures block the CI gate.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  analyze:
    name: SpotBugs + Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up JDK 21 toolchain
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Go for actionlint
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 'stable'
          cache: false

      - name: Set up Python for jury protocol tests
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Validate workflows
        shell: bash
        run: |
          set -euo pipefail
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Test Agent jury protocol
        run: |
          python -m py_compile \
            .github/scripts/agent_review.py \
            .github/scripts/test_agent_review.py
          python .github/scripts/test_agent_review.py

      # SpotBugs analyzes compiled bytecode, so classes must exist first.
      # A single reactor invocation resolves inter-module dependencies.
      - name: Compile classes
        run: mvn -B -ntp -DskipTests test-compile

      - name: SpotBugs
        # Existing EI_EXPOSE_REP findings predate this governance change. Keep
        # publishing reports without claiming the baseline is clean.
        continue-on-error: true
        run: mvn -B -ntp spotbugs:check

      - name: Checkstyle
        run: mvn -B -ntp checkstyle:check

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: static-analysis-reports
          path: |
            **/target/spotbugsXml.xml
            **/target/checkstyle-result.xml
          if-no-files-found: ignore
