name: Reusable / Test

# Reusable test pipeline: cross-platform framework build + sample verification.
# Called by ci.yml (push/PR) and release.yml (before publishing) so the exact
# same verification runs in CI and at release time. Not triggered directly.

on:
  workflow_call:

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    env:
      JAVA_TOOLCHAIN_VERSION: '21'
      MAVEN_COMPILE_RELEASE: '17'
      PYTHONUTF8: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 toolchain
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_TOOLCHAIN_VERSION }}
          cache: maven

      - name: Show Java toolchain and target bytecode
        shell: bash
        run: |
          java -version
          echo "Maven compiler release target: ${MAVEN_COMPILE_RELEASE}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sample verification dependencies
        run: python -m pip install cryptography

      - name: Verify framework and install artifacts
        run: mvn -B install

      - name: Verify sample parent version alignment
        run: python coco-samples/coco-sample-basic/scripts/verify_parent_version.py

      - name: Verify sample business application
        run: mvn -B -f coco-samples/coco-sample-basic/pom.xml verify

      - name: Verify sample feature pruning
        shell: bash
        run: |
          set -euo pipefail
          # pipefail: a `! grep ...` (negative assertion) hides the exit
          # status of grep itself. Without pipefail, if grep errors for any
          # reason (e.g. binary-file mismatch) the negation can mask the
          # failure and the test passes silently. With pipefail, the pipe's
          # exit code is the rightmost non-zero, so the assertion still trips.
          jar tf coco-samples/coco-sample-basic/target/coco-sample-basic-0.0.1-SNAPSHOT.jar \
            | grep 'BOOT-INF/lib/coco-feature'
          ! jar tf coco-samples/coco-sample-basic/target/coco-sample-basic-0.0.1-SNAPSHOT.jar \
            | grep -E 'coco-feature-(mybatis-plus|tenant|data-permission)-'
          ! jar tf coco-samples/coco-sample-basic/target/coco-sample-basic-0.0.1-SNAPSHOT.jar \
            | grep -E 'BOOT-INF/lib/(mybatis|mybatis-plus)-'
          jar xf coco-samples/coco-sample-basic/target/coco-sample-basic-0.0.1-SNAPSHOT.jar \
            BOOT-INF/classpath.idx BOOT-INF/layers.idx
          ! grep -E 'coco-feature-(mybatis-plus|tenant|data-permission)-|/(mybatis|mybatis-plus)-' BOOT-INF/classpath.idx BOOT-INF/layers.idx

      - name: Verify sample business flow with Python
        run: python coco-samples/coco-sample-basic/scripts/verify_business_flow.py

      - name: Verify full sample business application
        run: mvn -B -f coco-samples/coco-sample-full/pom.xml verify

      - name: Verify full sample feature composition
        shell: bash
        run: |
          for feature in web mybatis-plus audit security tenant data-permission openapi codegen; do
            jar tf coco-samples/coco-sample-full/target/coco-sample-full-0.0.1-SNAPSHOT.jar \
              | grep "BOOT-INF/lib/coco-feature-${feature}-"
          done
          jar tf coco-samples/coco-sample-full/target/coco-sample-full-0.0.1-SNAPSHOT.jar \
            | grep 'BOOT-INF/lib/h2-'

      - name: Verify full sample business flow with Python
        run: python coco-samples/coco-sample-full/scripts/verify_business_flow.py
